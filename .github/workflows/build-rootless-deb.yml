name: Build rootless DEB

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: waruhachi/theos-action@v2.4.6
        with:
          theos-src: 'theos/theos'
          theos-branch: 'master'
          sdks-src: 'theos/sdks'
          sdks-branch: 'master'

      - name: Build rootless package
        run: make clean package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flextest-libflex-rootless-debs
          path: |
            packages/*.deb
          if-no-files-found: error

      - name: Publish release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flextest-rootless-${{ github.run_number }}
          name: FLEXtest rootless build #${{ github.run_number }}
          generate_release_notes: true
          files: packages/*.deb
